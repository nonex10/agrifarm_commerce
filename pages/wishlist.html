<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>My Wishlist</h1>
        <p>Items you've saved for later</p>
      </div>
    </section>
    <div class="container" style="padding-top:2.5rem;padding-bottom:2.5rem;" id="wishlist-root"></div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');

    function renderWishlist() {
      const root = document.getElementById('wishlist-root');
      const items = State.wishlist;

      if (items.length === 0) {
        root.innerHTML = `
          <div class="wishlist-empty">
            <p style="font-size:3rem;margin-bottom:1rem">🤍</p>
            <h2 style="font-size:1.3rem;margin-bottom:.5rem">Your wishlist is empty</h2>
            <p class="text-muted" style="margin-bottom:1.5rem">Save items you love for later.</p>
            <a href="products.html" class="btn btn-primary">Browse Products</a>
          </div>`;
        return;
      }

      root.innerHTML = `
        <p class="product-count">${items.length} saved item${items.length !== 1 ? 's' : ''}</p>
        <div class="products-grid" id="wish-grid">
          ${items.map(p => productCardHTML(p, '../')).join('')}
        </div>`;

      bindProductCards(items, document.getElementById('wish-grid'));

      // Re-bind wishlist buttons to re-render on removal
      document.querySelectorAll('.wishlist-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const id = parseInt(btn.dataset.wish);
          const p = items.find(x => x.id === id);
          if (p) {
            State.toggleWishlist(p);
            updateNavBadges();
            renderWishlist();
          }
        });
      }, { once: true });
    }

    renderWishlist();
  </script>
</body>
</html>
