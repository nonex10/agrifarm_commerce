<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="container" style="padding:4rem 1rem;text-align:center">
      <div style="font-size:3.5rem;margin-bottom:1rem">✅</div>
      <h1 style="font-family:var(--font-display);font-size:1.8rem;margin-bottom:.5rem">Payment Successful!</h1>
      <p id="order-info" style="color:var(--muted-fg);margin-bottom:2rem"></p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="orders.html" class="btn btn-primary">View My Orders</a>
        <a href="products.html" class="btn btn-outline">Continue Shopping</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');

    const params  = new URLSearchParams(window.location.search);
    const orderId = params.get('oid') || '—';
    const amount  = params.get('amt') || '—';

    document.getElementById('order-info').innerHTML =
      `Your order <strong>${orderId}</strong> has been confirmed.<br>
       Amount paid: <strong>Rs. ${Number(amount).toLocaleString('en-NP')}</strong> via eSewa.`;
  </script>
</body>
</html>
