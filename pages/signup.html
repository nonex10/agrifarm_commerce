<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;">
  <div id="navbar-placeholder"></div>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Get Started</h1>
      <p class="subtitle">Create your AgriFresh account</p>
      <div id="error-msg"></div>

      <form class="auth-form" id="signup-form" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input id="name" class="input" type="text" placeholder="Your full name" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" class="input" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" placeholder="Min 6 characters" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <input id="confirm" class="input" type="password" placeholder="Repeat password" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary w-full" id="submit-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
      <p class="auth-note">By signing up, you agree to our Terms of Service.</p>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('submit-btn');

      errEl.innerHTML = '';

      if (!name || !email || !password) {
        errEl.innerHTML = `<div class="alert-error">Please fill in all fields.</div>`; return;
      }
      if (password !== confirm) {
        errEl.innerHTML = `<div class="alert-error">Passwords do not match.</div>`; return;
      }
      if (password.length < 6) {
        errEl.innerHTML = `<div class="alert-error">Password must be at least 6 characters.</div>`; return;
      }

      btn.disabled  = true;
      btn.innerHTML = `<span class="spinner"></span> Creating account…`;

      const result = await signupUser(name, email, password);

      btn.disabled  = false;
      btn.innerHTML = 'Create Account';

      if (result.error) {
        errEl.innerHTML = `<div class="alert-error">${result.error}</div>`;
        return;
      }

      // Success – redirect home
      window.location.href = '../index.html';
    });
  </script>
</body>
</html>
