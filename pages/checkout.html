<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; padding: 2.5rem 0; }
    @media (max-width:900px) { .checkout-layout { grid-template-columns: 1fr; } }
    .checkout-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1.5rem; }
    .checkout-section h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; gap: .5rem; }
    .checkout-form { display: flex; flex-direction: column; gap: 1rem; }
    .checkout-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width:580px) { .checkout-form .form-row { grid-template-columns: 1fr; } }

    /* Payment options */
    .payment-options { display: flex; flex-direction: column; gap: .6rem; }
    .payment-option {
      display: flex; align-items: center; gap: .75rem;
      border: 1.5px solid var(--border); border-radius: var(--radius); padding: .75rem 1rem;
      cursor: pointer; transition: border-color .15s, background .15s;
    }
    .payment-option:has(input:checked) { border-color: var(--primary); background: var(--primary-light); }
    .payment-option input { accent-color: var(--primary); }
    .payment-option .payment-logo { height: 1.4rem; }

    /* eSewa info box – shown when eSewa is selected */
    #esewa-info {
      display: none;
      background: #f0faf4; border: 1px solid #a8d5b5;
      border-radius: var(--radius); padding: .75rem 1rem;
      font-size: .85rem; color: #2e6b31; margin-top: .25rem;
    }
    #esewa-info.visible { display: block; }

    /* Order summary */
    .checkout-mini-item { display: flex; gap: .75rem; align-items: center; margin-bottom: .75rem; font-size: .875rem; }
    .checkout-mini-item img { width: 3rem; height: 3rem; object-fit: cover; border-radius: .4rem; background: var(--muted); }
    .checkout-mini-item .name  { flex: 1; font-weight: 500; }
    .checkout-mini-item .price { color: var(--primary); font-weight: 600; }

    /* Success */
    .success-card { text-align: center; padding: 3rem 2rem; background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); }
    .success-card .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .success-card h1 { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: .5rem; }
    .success-card p  { color: var(--muted-fg); margin-bottom: 2rem; }

    #place-order-btn:disabled { opacity: .7; cursor: not-allowed; }
    .spinner { display: inline-block; width: 1em; height: 1em; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: .4em; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Checkout</h1>
        <p>Complete your order</p>
      </div>
    </section>
    <div class="container" id="checkout-root"></div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');

    const VAT = 0.13;

    function renderCheckout() {
      const root  = document.getElementById('checkout-root');
      const items = State.cart;

      if (items.length === 0) {
        root.innerHTML = `
          <div style="text-align:center;padding:4rem 1rem">
            <p class="text-muted" style="font-size:1.1rem;margin-bottom:1.5rem">Your cart is empty.</p>
            <a href="products.html" class="btn btn-primary">Shop Now</a>
          </div>`;
        return;
      }

      const subtotal = State.cartTotal();
      const vat      = Math.round(subtotal * VAT);
      const total    = subtotal + vat;

      root.innerHTML = `
        <div class="checkout-layout">
          <div>
            <!-- SHIPPING -->
            <div class="checkout-section">
              <h2>📍 Shipping Address</h2>
              <div class="checkout-form" id="checkout-form">
                <div class="form-row">
                  <div class="form-group">
                    <label for="fname">First Name *</label>
                    <input id="fname" class="input" type="text" required autocomplete="given-name">
                  </div>
                  <div class="form-group">
                    <label for="lname">Last Name *</label>
                    <input id="lname" class="input" type="text" required autocomplete="family-name">
                  </div>
                </div>
                <div class="form-group">
                  <label for="email">Email *</label>
                  <input id="email" class="input" type="email" required
                         value="${State.user ? State.user.email : ''}" autocomplete="email">
                </div>
                <div class="form-group">
                  <label for="phone">Phone *</label>
                  <input id="phone" class="input" type="tel" required placeholder="+977 98XXXXXXXX">
                </div>
                <div class="form-group">
                  <label for="address">Street Address *</label>
                  <input id="address" class="input" type="text" required autocomplete="street-address">
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="city">City *</label>
                    <input id="city" class="input" type="text" required autocomplete="address-level2">
                  </div>
                  <div class="form-group">
                    <label for="district">District *</label>
                    <input id="district" class="input" type="text" required>
                  </div>
                </div>
              </div>
            </div>

            <!-- PAYMENT -->
            <div class="checkout-section">
              <h2>💳 Payment Method</h2>
              <div class="payment-options">

                <label class="payment-option">
                  <input type="radio" name="payment" value="cod" checked>
                  <span>Cash on Delivery</span>
                </label>

                <label class="payment-option">
                  <input type="radio" name="payment" value="esewa">
                  <span>eSewa</span>
                </label>

              </div>

              <!-- Info shown when eSewa is selected -->
              <div id="esewa-info">
                ✅ You'll be redirected to eSewa to complete your payment after placing the order.
              </div>
            </div>

            <div id="error-msg"></div>
            <button class="btn btn-primary btn-lg w-full" id="place-order-btn">
              Place Order
            </button>
          </div>

          <!-- ORDER SUMMARY SIDEBAR -->
          <div class="order-summary" style="position:sticky;top:5rem;">
            <h2>Order Summary</h2>
            ${items.map(i => `
              <div class="checkout-mini-item">
                <img src="${resolveImage(i.image)}"
                     alt="${i.name}"
                     onerror="this.src='https://placehold.co/48x48/d4e9d4/2e6b31?text=?'">
                <span class="name">${i.name} × ${i.quantity}</span>
                <span class="price">Rs. ${(i.price * i.quantity).toLocaleString('en-NP')}</span>
              </div>`).join('')}
            <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0">
            <div class="summary-row"><span>Subtotal</span><span>Rs. ${subtotal.toLocaleString('en-NP')}</span></div>
            <div class="summary-row"><span>Shipping</span><span>Free</span></div>
            <div class="summary-row"><span>VAT (13%)</span><span>Rs. ${vat.toLocaleString('en-NP')}</span></div>
            <div class="summary-row summary-total">
              <span>Total</span>
              <span class="amount">Rs. ${total.toLocaleString('en-NP')}</span>
            </div>
          </div>
        </div>`;

      /* Show/hide eSewa info box on payment change */
      document.querySelectorAll('input[name="payment"]').forEach(radio => {
        radio.addEventListener('change', () => {
          const info = document.getElementById('esewa-info');
          info.classList.toggle('visible', radio.value === 'esewa' && radio.checked);
        });
      });

      /* Place Order */
      document.getElementById('place-order-btn').addEventListener('click', async () => {
        const fname    = document.getElementById('fname').value.trim();
        const lname    = document.getElementById('lname').value.trim();
        const email    = document.getElementById('email').value.trim();
        const phone    = document.getElementById('phone').value.trim();
        const address  = document.getElementById('address').value.trim();
        const city     = document.getElementById('city').value.trim();
        const district = document.getElementById('district').value.trim();
        const payment  = document.querySelector('input[name="payment"]:checked').value;
        const errEl    = document.getElementById('error-msg');
        const btn      = document.getElementById('place-order-btn');

        if (!fname || !lname || !email || !phone || !address || !city || !district) {
          errEl.innerHTML = `<div class="alert-error">Please fill in all required fields.</div>`;
          return;
        }

        errEl.innerHTML = '';
        btn.disabled    = true;
        btn.innerHTML   = `<span class="spinner"></span> Placing order…`;

        const fullAddress = `${fname} ${lname}, ${address}, ${city}, ${district}`;

        const result = await placeOrder({
          id:            'ORD-' + Date.now(),
          items,
          total,
          address:       fullAddress,
          payment,
          customer_name: `${fname} ${lname}`,
          date:          new Date().toISOString(),
          status:        'Confirmed',
        });

        btn.disabled  = false;
        btn.innerHTML = 'Place Order';

        if (result.error) {
          errEl.innerHTML = `<div class="alert-error">${result.error}</div>`;
          return;
        }

        /* Clear cart */
        State.cart = [];
        State.saveCart();
        updateNavBadges();

        const orderId = result.order_id || 'ORD-' + Date.now();

        if (payment === 'esewa') {
          /* Redirect to eSewa with order details */
          redirectToEsewa(total, orderId);
        } else {
          showSuccess(orderId, payment);
        }
      });
    }

    /* ── eSewa redirect ───────────────────────────────────────
       Uses eSewa's test/UAT endpoint. For production change the
       action URL to: https://esewa.com.np/epay/main
       -------------------------------------------------------- */
    // function redirectToEsewa(amount, orderId) {
    //   const ESEWA_URL = 'https://uat.esewa.com.np/epay/main'; // UAT (test)
    //   // const ESEWA_URL = 'https://esewa.com.np/epay/main';  // Production

    //   const params = {
    //     amt:        amount,          // product amount
    //     psc:        0,               // product service charge
    //     pdc:        0,               // product delivery charge
    //     txAmt:      0,               // tax amount
    //     tAmt:       amount,          // total amount
    //     pid:        orderId,         // unique product/order ID
    //     scd:        'EPAYTEST',      // merchant code (use your real code in production)
    //     su:         `${window.location.origin}/agrifarm/pages/esewa-success.html?oid=${orderId}&amt=${amount}`,
    //     fu:         `${window.location.origin}/agrifarm/pages/checkout.html`,
    //   };

    //   // Build and auto-submit a form (eSewa requires POST)
    //   const form = document.createElement('form');
    //   form.method = 'POST';
    //   form.action = ESEWA_URL;

    //   Object.entries(params).forEach(([key, val]) => {
    //     const input = document.createElement('input');
    //     input.type  = 'hidden';
    //     input.name  = key;
    //     input.value = val;
    //     form.appendChild(input);
    //   });

    //   document.body.appendChild(form);
    //   form.submit();
    // }
    function redirectToEsewa(amount, orderId) {

// eSewa UAT v2 endpoint
const ESEWA_URL = 'https://rc-epay.esewa.com.np/api/epay/main/v2/form';

const params = {
  amount: amount,
  tax_amount: 0,
  total_amount: amount,
  transaction_uuid: orderId,
  product_code: 'EPAYTEST',

  product_service_charge: 0,
  product_delivery_charge: 0,

  success_url:
    `${window.location.origin}/agrifarm/pages/esewa-success.html?oid=${orderId}`,

  failure_url:
    `${window.location.origin}/agrifarm/pages/checkout.html`,

  signed_field_names:
    'total_amount,transaction_uuid,product_code',

  signature:
    'YOUR_GENERATED_SIGNATURE'
};

const form = document.createElement('form');
form.method = 'POST';
form.action = ESEWA_URL;

Object.entries(params).forEach(([key, value]) => {
  const input = document.createElement('input');
  input.type = 'hidden';
  input.name = key;
  input.value = value;
  form.appendChild(input);
});

document.body.appendChild(form);
form.submit();
}
    /* ── Success screen (COD) ─────────────────────────────── */
    function showSuccess(orderId, payment) {
      document.getElementById('checkout-root').innerHTML = `
        <div class="success-card">
          <div class="icon">🎉</div>
          <h1>Order Placed!</h1>
          <p>Your order <strong>${orderId}</strong> has been confirmed.<br>
             Payment: <strong>Cash on Delivery</strong></p>
          <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
            <a href="orders.html" class="btn btn-primary">View My Orders</a>
            <a href="products.html" class="btn btn-outline">Continue Shopping</a>
          </div>
        </div>`;
    }

    renderCheckout();
  </script>
</body>
</html>
