<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .checkout-layout { display:grid; grid-template-columns:1fr 340px; gap:2rem; padding:2.5rem 0; }
    @media(max-width:900px){ .checkout-layout{grid-template-columns:1fr;} }
    .checkout-section { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.75rem; margin-bottom:1.5rem; }
    .checkout-section h2 { font-size:1rem; font-weight:700; margin-bottom:1.25rem; display:flex; align-items:center; gap:.5rem; }
    .checkout-form { display:flex; flex-direction:column; gap:1rem; }
    .checkout-form .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:580px){ .checkout-form .form-row{grid-template-columns:1fr;} }
    .payment-options { display:flex; flex-direction:column; gap:.6rem; }
    .payment-option {
      display:flex; align-items:center; gap:.75rem;
      border:1.5px solid var(--border); border-radius:var(--radius); padding:.75rem 1rem;
      cursor:pointer; transition:border-color .15s, background .15s;
    }
    .payment-option:has(input:checked) { border-color:var(--primary); background:var(--primary-light); }
    .payment-option input { accent-color:var(--primary); }
    .checkout-mini-item { display:flex; gap:.75rem; align-items:center; margin-bottom:.75rem; font-size:.875rem; }
    .checkout-mini-item img { width:3rem; height:3rem; object-fit:cover; border-radius:.4rem; background:var(--muted); }
    .checkout-mini-item .name { flex:1; font-weight:500; }
    .checkout-mini-item .price { color:var(--primary); font-weight:600; }
    .success-card { text-align:center; padding:3rem 2rem; background:var(--card); border-radius:var(--radius-lg); border:1px solid var(--border); }
    .success-card .icon { font-size:3.5rem; margin-bottom:1rem; }
    .success-card h1 { font-family:var(--font-display); font-size:1.8rem; margin-bottom:.5rem; }
    .success-card p { color:var(--muted-fg); margin-bottom:2rem; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Checkout</h1>
        <p>Complete your order</p>
      </div>
    </section>
    <div class="container" id="checkout-root"></div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');
    const VAT = 0.13;

    function renderCheckout() {
      const root = document.getElementById('checkout-root');
      const items = State.cart;
      if (items.length === 0) {
        root.innerHTML = `<div style="text-align:center;padding:4rem 1rem"><p class="text-muted" style="font-size:1.1rem;margin-bottom:1.5rem">Your cart is empty.</p><a href="products.html" class="btn btn-primary">Shop Now</a></div>`;
        return;
      }
      const subtotal = State.cartTotal();
      const vat = Math.round(subtotal * VAT);
      const total = subtotal + vat;

      root.innerHTML = `
        <div class="checkout-layout">
          <div>
            <div class="checkout-section">
              <h2>📍 Shipping Address</h2>
              <div class="checkout-form" id="checkout-form">
                <div class="form-row">
                  <div class="form-group">
                    <label for="fname">First Name *</label>
                    <input id="fname" class="input" type="text" required>
                  </div>
                  <div class="form-group">
                    <label for="lname">Last Name *</label>
                    <input id="lname" class="input" type="text" required>
                  </div>
                </div>
                <div class="form-group">
                  <label for="email">Email *</label>
                  <input id="email" class="input" type="email" required value="${State.user ? State.user.email : ''}">
                </div>
                <div class="form-group">
                  <label for="phone">Phone *</label>
                  <input id="phone" class="input" type="tel" required placeholder="+977 98XXXXXXXX">
                </div>
                <div class="form-group">
                  <label for="address">Street Address *</label>
                  <input id="address" class="input" type="text" required>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="city">City *</label>
                    <input id="city" class="input" type="text" required>
                  </div>
                  <div class="form-group">
                    <label for="district">District *</label>
                    <input id="district" class="input" type="text" required>
                  </div>
                </div>
              </div>
            </div>

            <div class="checkout-section">
              <h2>💳 Payment Method</h2>
              <div class="payment-options">
                <label class="payment-option">
                  <input type="radio" name="payment" value="cod" checked> Cash on Delivery
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="esewa"> eSewa
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="khalti"> Khalti
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="bank"> Bank Transfer
                </label>
              </div>
            </div>

            <div id="error-msg"></div>
            <button class="btn btn-primary btn-lg w-full" id="place-order-btn">Place Order</button>
          </div>

          <div class="order-summary" style="position:sticky;top:5rem;">
            <h2>Order Summary</h2>
            ${items.map(i => `
              <div class="checkout-mini-item">
                <img src="${i.image || ''}" alt="${i.name}" onerror="this.src='https://placehold.co/48x48/d4e9d4/2e6b31?text=?'">
                <span class="name">${i.name} × ${i.quantity}</span>
                <span class="price">Rs. ${(i.price * i.quantity).toLocaleString('en-NP')}</span>
              </div>
            `).join('')}
            <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0">
            <div class="summary-row"><span>Subtotal</span><span>Rs. ${subtotal.toLocaleString('en-NP')}</span></div>
            <div class="summary-row"><span>Shipping</span><span>Free</span></div>
            <div class="summary-row"><span>VAT (13%)</span><span>Rs. ${vat.toLocaleString('en-NP')}</span></div>
            <div class="summary-row summary-total"><span>Total</span><span class="amount">Rs. ${total.toLocaleString('en-NP')}</span></div>
          </div>
        </div>`;

      document.getElementById('place-order-btn').addEventListener('click', () => {
        const fname = document.getElementById('fname').value.trim();
        const lname = document.getElementById('lname').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const city = document.getElementById('city').value.trim();
        const district = document.getElementById('district').value.trim();
        const errEl = document.getElementById('error-msg');

        if (!fname || !lname || !email || !phone || !address || !city || !district) {
          errEl.innerHTML = `<div class="alert-error">Please fill in all required fields.</div>`;
          return;
        }
        errEl.innerHTML = '';

        const payment = document.querySelector('input[name="payment"]:checked').value;
        const order = {
          id: 'ORD-' + Date.now(),
          date: new Date().toISOString(),
          items: [...State.cart],
          total,
          payment,
          address: `${fname} ${lname}, ${address}, ${city}, ${district}`,
          status: 'Confirmed'
        };

        const orders = JSON.parse(localStorage.getItem('agri_orders') || '[]');
        orders.unshift(order);
        localStorage.setItem('agri_orders', JSON.stringify(orders));

        State.cart = [];
        State.saveCart();
        updateNavBadges();

        root.innerHTML = `
          <div class="success-card" style="max-width:560px;margin:3rem auto;">
            <div class="icon">✅</div>
            <h1>Order Placed!</h1>
            <p>Thank you, <strong>${fname}</strong>! Your order <strong>${order.id}</strong> has been confirmed. We'll deliver to <em>${city}</em> within 24–48 hours.</p>
            <div class="flex-gap" style="justify-content:center;">
              <a href="orders.html" class="btn btn-primary">View Orders</a>
              <a href="products.html" class="btn btn-outline">Continue Shopping</a>
            </div>
          </div>`;
      });
    }

    renderCheckout();
  </script>
</body>
</html>
