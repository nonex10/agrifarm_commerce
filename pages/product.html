<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .product-detail { padding: 2.5rem 0; }
    .product-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 768px) { .product-detail-grid { grid-template-columns: 1fr; } }
    .product-detail-img {
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--muted);
    }
    .product-detail-img img { width:100%; height:100%; object-fit:cover; }
    .product-detail-info h1 {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      margin-bottom: 0.5rem;
    }
    .product-detail-farmer {
      color: var(--muted-fg);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .product-detail-price {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.25rem;
    }
    .product-detail-desc {
      color: var(--muted-fg);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .qty-row { display:flex; align-items:center; gap:1rem; margin-bottom:1.25rem; }
    .qty-row label { font-weight:500; }
    .actions-row { display:flex; gap:.75rem; flex-wrap:wrap; }
    .back-link { display:inline-flex; align-items:center; gap:.4rem; color:var(--muted-fg); font-size:.875rem; margin-bottom:1.5rem; transition:color .15s; }
    .back-link:hover { color:var(--primary); }
    .meta-row { display:flex; align-items:center; gap:1.5rem; margin-bottom:1rem; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="container product-detail" id="product-content">
      <p class="text-muted">Loading…</p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const product = PRODUCTS.find(p => p.id === id);
    const content = document.getElementById('product-content');

    if (!product) {
      content.innerHTML = `<div class="empty-state"><p>Product not found.</p><a href="products.html" class="btn btn-primary mt-4">Back to Products</a></div>`;
    } else {
      document.title = `${product.name} – AgriFresh Nepal`;
      let qty = 1;

      function render() {
        const wishlisted = State.isWishlisted(product.id);
        content.innerHTML = `
          <a href="products.html" class="back-link">← Back to Products</a>
          <div class="product-detail-grid">
            <div class="product-detail-img">
              <img src="${product.image || ''}" alt="${product.name}" onerror="this.src='https://placehold.co/600x450/d4e9d4/2e6b31?text=Product'">
            </div>
            <div class="product-detail-info">
              <span class="badge mb-2">${product.category}</span>
              <h1>${product.name}</h1>
              <p class="product-detail-farmer">🌾 ${product.farmer}</p>
              <div class="meta-row">
                <div class="stars">${starsHTML(product.rating)}<span class="review-count">(${product.reviews} reviews)</span></div>
              </div>
              <div class="product-detail-price">Rs. ${product.price.toLocaleString('en-NP')} <small style="font-size:.9rem;color:var(--muted-fg);font-weight:400">/ unit</small></div>
              <p class="product-detail-desc">${product.description}</p>
              <div class="qty-row">
                <label>Qty:</label>
                <div class="qty-control">
                  <button class="qty-btn" id="qty-minus">−</button>
                  <span class="qty-num" id="qty-display">${qty}</span>
                  <button class="qty-btn" id="qty-plus">+</button>
                </div>
              </div>
              <div class="actions-row">
                <button class="btn btn-primary" id="add-cart">🛒 Add to Cart</button>
                <button class="btn btn-outline" id="wish-btn">${wishlisted ? '❤️ Wishlisted' : '🤍 Wishlist'}</button>
              </div>
            </div>
          </div>`;

        document.getElementById('qty-minus').addEventListener('click', () => {
          if (qty > 1) { qty--; document.getElementById('qty-display').textContent = qty; }
        });
        document.getElementById('qty-plus').addEventListener('click', () => {
          qty++;
          document.getElementById('qty-display').textContent = qty;
        });
        document.getElementById('add-cart').addEventListener('click', () => {
          State.addToCart(product, qty);
          showToast(`${product.name} × ${qty} added to cart`);
        });
        document.getElementById('wish-btn').addEventListener('click', () => {
          const added = State.toggleWishlist(product);
          showToast(added ? 'Added to wishlist' : 'Removed from wishlist');
          render();
        });
      }
      render();
    }
  </script>
</body>
</html>
