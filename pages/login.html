<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body style="display:flex;flex-direction:column;min-height:100vh;">
  <div id="navbar-placeholder"></div>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your AgriFresh account</p>
      <div id="error-msg"></div>

      <form class="auth-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input id="email" class="input" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary w-full" id="submit-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
      <hr class="auth-divider" />
      <a href="../index.html" class="btn btn-outline w-full">Continue as Guest</a>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('submit-btn');

      if (!email || !password) {
        errEl.innerHTML = `<div class="alert-error">Please fill in all fields.</div>`;
        return;
      }

      btn.disabled  = true;
      btn.innerHTML = `<span class="spinner"></span> Signing in…`;
      errEl.innerHTML = '';

      const result = await loginUser(email, password);

      btn.disabled  = false;
      btn.innerHTML = 'Sign In';

      if (result.error) {
        errEl.innerHTML = `<div class="alert-error">${result.error}</div>`;
        return;
      }

      // Success – redirect
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || '../index.html';
    });
  </script>
</body>
</html>
