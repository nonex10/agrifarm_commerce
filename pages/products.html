<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Products – AgriFresh Nepal</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="navbar-placeholder"></div>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Shop Fresh Produce</h1>
        <p>Browse fresh products from local farmers across Nepal</p>
      </div>
    </section>

    <div class="container">
      <div class="products-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-card">
            <h3>Categories</h3>
            <div class="category-list" id="category-list">
              <button class="category-btn active" data-cat="">All Products</button>
            </div>
          </div>
        </aside>

        <!-- Main -->
        <div>
          <div class="search-bar mb-6">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="search" id="search-input" placeholder="Search products, farmers…" />
          </div>

          <p class="product-count" id="product-count"></p>

          <div id="products-grid" class="products-grid">
            <p class="text-muted" style="grid-column:1/-1;text-align:center;padding:3rem">Loading…</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../js/app.js"></script>
  <script src="../js/layout.js"></script>
  <script>
    injectLayout('../');

    const categories = ['All Products', ...new Set(PRODUCTS.map(p => p.category))];
    const catList = document.getElementById('category-list');
    catList.innerHTML = categories.map((c, i) =>
      `<button class="category-btn ${i===0?'active':''}" data-cat="${i===0?'':c}">${c}</button>`
    ).join('');

    let selectedCat = '';
    let searchQ = '';

    function renderProducts() {
      const filtered = PRODUCTS.filter(p => {
        const matchCat = !selectedCat || p.category === selectedCat;
        const q = searchQ.toLowerCase();
        const matchSearch = !q || p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || p.farmer.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });

      const grid = document.getElementById('products-grid');
      const count = document.getElementById('product-count');
      count.textContent = `Showing ${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>No products found matching your criteria.</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map(p => productCardHTML(p, '../')).join('');
      bindProductCards(filtered, grid);
    }

    document.getElementById('category-list').addEventListener('click', e => {
      const btn = e.target.closest('.category-btn');
      if (!btn) return;
      document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCat = btn.dataset.cat;
      renderProducts();
    });

    document.getElementById('search-input').addEventListener('input', e => {
      searchQ = e.target.value;
      renderProducts();
    });

    renderProducts();
  </script>
</body>
</html>
